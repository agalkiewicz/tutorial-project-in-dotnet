name: Deploy 🚀

on:
  workflow_dispatch:
  push:
    branches:
      - main
env:
  # This tells the GitHub runner to use Node 24 for all JS actions
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4
      - name: ⚙️ Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x
      - name: 📦 Restore Dependencies
        run: dotnet restore first-project.csproj
      - name: 🏗️ Build Project
        run: dotnet build first-project.csproj --no-restore
      - name: ✅ Run Tests
        run: dotnet test first-project.csproj --no-build --verbosity normal
  publish:
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: 🔐 Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: 🔑 Login to Amazon ECR
        run: aws ecr get-login-password --region eu-north-1 | docker login --username AWS --password-stdin ${{ secrets.REPOSITORY }}

      - name: 📦 Publish Docker Image to Amazon ECR
        working-directory: .
        run: |
          dotnet publish -c Release --os linux --arch x64 /t:PublishContainer \
            -p:ContainerRepository=${{ secrets.REPOSITORY }} \
            -p:ContainerImageTag=latest
          docker push ${{ secrets.REPOSITORY }}:latest